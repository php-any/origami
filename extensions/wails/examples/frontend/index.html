<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wails v3 · 任务清单 (前端目录)</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>📝 任务清单</h1>
    <p class="sub">前端使用独立目录 (index.html / style.css / app.js)，状态由 Origami PHP 后端维护</p>
  </header>

  <section class="composer">
    <input id="input" type="text" placeholder="输入任务后回车，或点击添加…" autocomplete="off">
    <button id="add">添加</button>
  </section>

  <ul id="list" class="list"></ul>

  <footer>
    <span id="count">0 项任务</span>
    <button id="clear" class="ghost">清除已完成</button>
  </footer>

  <script type="module" src="/app.js"></script>
</body>
</html>
